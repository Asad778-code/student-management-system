<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Students — Student Management System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-xl">
    <a class="navbar-brand" href="index.html"><i class="bi bi-mortarboard-fill"></i> Student Management System</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="users.html"><i class="bi bi-people"></i> Students</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html"><i class="bi bi-info-circle"></i> About</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html"><i class="bi bi-envelope"></i> Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<header class="page-header">
  <div class="container-xl">
    <div class="row align-items-center g-3">
      <div class="col-md-7">
        <h1 class="text-gradient">Student Directory</h1>
        <p>Manage registrations and institutional records.</p>
      </div>
      <div class="col-md-5 d-flex justify-content-md-end gap-2 flex-wrap">
        <button class="btn btn-outline-secondary" id="exportCSV">
          <i class="bi bi-filetype-csv me-1"></i> Export CSV
        </button>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal" id="addUserBtn">
          <i class="bi bi-person-plus me-1"></i> Add Student
        </button>
      </div>
    </div>
  </div>
</header>

<main class="container-xl pb-5">
  <div class="search-bar">
    <div class="row g-3 align-items-center">
      <div class="col-lg-5">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-search"></i></span>
          <input type="text" id="searchInput" class="form-control" placeholder="Search students..." />
        </div>
      </div>
      <div class="col-md-2 col-6">
        <select id="statusFilter" class="form-select">
          <option value="all">All Status</option>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>
      <div class="col-md-2 col-6">
        <select id="typeFilter" class="form-select">
          <option value="all">All Types</option>
          <option value="Student">Student</option>
          <option value="Standard">Standard</option>
          <option value="Premium">Premium</option>
        </select>
      </div>
      <div class="col-md-2 col-9">
        <button id="searchBtn" class="btn btn-primary w-100"><i class="bi bi-search me-1"></i>Search</button>
      </div>
      <div class="col-md-1 col-3 text-end">
        <button id="clearBtn" class="btn btn-outline-secondary w-100"><i class="bi bi-arrow-counterclockwise"></i></button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-list-columns-reverse me-2"></i>Student Records</span>
      <span id="users-count" class="badge" style="background:rgba(99,102,241,0.1); color:var(--primary-glow)">Loading...</span>
    </div>
    <div class="table-responsive">
      <table class="table table-hover" id="usersTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Membership</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="6"><div class="spinner-wrap py-5"><div class="spinner-border"></div></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modals -->
<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Add New Student</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="userForm">
          <input type="hidden" id="userId" />
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input type="text" id="fName" class="form-control" placeholder="John Doe" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" id="fEmail" class="form-control" placeholder="john@example.com" required />
            </div>
            <div class="col-md-4">
              <label class="form-label">Phone</label>
              <input type="text" id="fPhone" class="form-control" placeholder="+1..." />
            </div>
            <div class="col-md-4">
              <label class="form-label">Type</label>
              <select id="fType" class="form-select">
                <option value="Student">Student</option>
                <option value="Standard">Standard</option>
                <option value="Premium">Premium</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Status</label>
              <select id="fStatus" class="form-select">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="saveUserBtn" class="btn btn-primary">Save Student</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0"><h5 class="modal-title">Delete Record</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body py-2 text-center">
        <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3 d-block"></i>
        <p class="mb-0">Delete <strong id="deleteUserName"></strong>?</p>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-outline-secondary w-100 mb-2" data-bs-dismiss="modal">Cancel</button>
        <button id="confirmDeleteBtn" class="btn btn-danger w-100">Delete</button>
      </div>
    </div>
  </div>
</div>

<footer class="section-padding"><div class="container-xl"><p>© 2024 Student Management System</p></div></footer>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/users.js"></script>
</body>
</html>
